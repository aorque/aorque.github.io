<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>an invitation.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Cormorant Garamond',serif;background:#f7f4ee;color:#2b2b28;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{max-width:480px;width:100%;background:#fffdf9;border:1px solid #e3ddd2;padding:64px 48px;text-align:center;box-shadow:0 20px 60px rgba(43,43,40,0.08);animation:reveal 1.2s ease-out;}
@keyframes reveal{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.rule{width:48px;height:1px;background:#b8a888;margin:0 auto 28px;}
h1{font-size:2.4rem;font-weight:400;font-style:italic;letter-spacing:0.02em;margin-bottom:24px;}
.body-text{font-size:1.2rem;line-height:1.7;color:#4a4a44;margin-bottom:40px;}
.button-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
button{font-family:'Montserrat',sans-serif;font-weight:400;font-size:0.82rem;letter-spacing:0.18em;text-transform:uppercase;padding:16px 30px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.25s ease;border-radius:0;}
button:active{transform:scale(0.97);}
.btn-accept{background:#2b2b28;color:#f7f4ee;border:1px solid #2b2b28;}
.btn-accept:hover{background:#b8a888;border-color:#b8a888;}
.btn-decline{background:transparent;color:#8a8378;border:1px solid #d5cdbe;}
.decline-note{font-family:'Montserrat',sans-serif;font-size:0.72rem;letter-spacing:0.08em;color:#b8a888;margin-top:22px;min-height:1.5em;font-style:normal;}
.hidden{display:none !important;}
#responseContainer h2{font-size:2.2rem;font-style:italic;font-weight:400;margin-bottom:18px;}
#responseContainer p{font-size:1.15rem;line-height:1.7;color:#4a4a44;}
.reset-btn{background:none;border:none;color:#b8a888;margin-top:36px;font-size:0.72rem;}
.footer{position:fixed;bottom:16px;left:0;right:0;text-align:center;font-family:'Montserrat',sans-serif;font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:#b3ab9d;}
@media(max-width:600px){.card{padding:48px 28px;}h1{font-size:2rem;}}
</style>
</head>
<body>
<div class="card" id="mainContainer">
  <div class="rule"></div>
  <h1>an invitation.</h1>
  <p class="body-text">I would like to take you to dinner.<br>The app is called Riff.<br>The conversation will be good.</p>
  <div class="button-row">
    <button class="btn-accept" id="acceptBtn" type="button">I accept</button>
    <button class="btn-decline" id="declineBtn" type="button">I must decline</button>
  </div>
  <div class="decline-note" id="declineNote"></div>
</div>
<div class="card hidden" id="responseContainer">
  <div class="rule"></div>
  <h2>How wonderful.</h2>
  <p>A reservation shall be made.<br>Details to follow shortly.</p>
  <button class="reset-btn" id="backBtn" type="button">← return</button>
</div>
<div class="footer">Riff · A Fleeting Moments Experience</div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var declines = 0;
  var notes = ['Are you quite certain?','One does not simply decline.','The chef will be devastated.','We have already chilled the champagne.','Regrettably, declining is no longer on the menu.'];

  function onAccept(){
    $('mainContainer').classList.add('hidden');
    $('responseContainer').classList.remove('hidden');
  }

  function onDecline(){
    declines++;
    var btn = $('declineBtn');
    $('declineNote').textContent = notes[Math.min(declines-1, notes.length-1)];
    btn.style.opacity = Math.max(1 - declines*0.22, 0.1);
    btn.style.fontSize = Math.max(0.82 - declines*0.09, 0.4) + 'rem';
    if (declines >= 5){
      btn.classList.add('hidden');
      $('declineNote').textContent = 'It appears "I accept" is the only remaining option.';
    }
  }

  $('acceptBtn').addEventListener('click', onAccept);
  $('declineBtn').addEventListener('click', onDecline);
  $('backBtn').addEventListener('click', function(){ location.reload(); });
})();
</script>
</body>
</html>
