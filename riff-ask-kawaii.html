<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>will you go on a lil date with me?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pink:#ffb6c1;--lavender:#e6d5f5;--mint:#b5ead7;--cream:#fdf6f0;}
html,body{height:100%;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:#5a4a6f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
@keyframes floatHeart{0%{opacity:0;transform:translateY(100vh);}10%{opacity:1;}90%{opacity:1;}100%{opacity:0;transform:translateY(-100vh) translateX(80px);}}
.heart{position:fixed;font-size:2rem;pointer-events:none;z-index:0;animation:floatHeart linear forwards;}
.container{text-align:center;position:relative;z-index:2;max-width:500px;width:100%;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.screen{animation:fadeIn 0.6s ease-out;}
h1{font-size:2.2rem;font-weight:800;margin-bottom:10px;line-height:1.2;}
.kaomoji-main{font-size:1.5rem;display:block;margin:8px 0 30px;}
.button-group{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;min-height:120px;}
button{font-family:'Nunito',sans-serif;font-weight:800;font-size:1.05rem;border:none;border-radius:999px;padding:16px 36px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:transform 0.15s ease,background 0.3s ease;}
button:active{transform:scale(0.94);}
#yes-btn{background:linear-gradient(135deg,var(--pink),var(--lavender));color:#fff;box-shadow:0 6px 20px rgba(255,182,193,0.5);}
#no-btn{background:var(--mint);color:#4a6f5e;}
#no-btn-container{position:relative;display:inline-block;}
.dodge{position:fixed !important;transition:top 0.25s ease,left 0.25s ease;z-index:50;}
.speech{font-size:0.9rem;margin-top:18px;min-height:1.4em;opacity:0.8;}
.hidden{display:none !important;}
.big-emoji{font-size:5rem;margin:16px 0;}
.reset-btn{background:none;color:#5a4a6f;font-size:0.85rem;padding:10px;opacity:0.6;margin-top:24px;}
.footer{position:fixed;bottom:14px;left:0;right:0;text-align:center;font-size:0.75rem;opacity:0.5;z-index:2;}
.nice-modal{display:none;position:fixed;inset:0;background:rgba(90,74,111,0.5);z-index:600;align-items:center;justify-content:center;}
.nice-modal.show{display:flex;}
.nice-modal-inner{background:#fff;border-radius:20px;padding:40px;text-align:center;color:#5a4a6f;animation:popIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);}
@keyframes popIn{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.nice-modal-inner h2{font-size:2rem;margin-bottom:10px;}
.confetti-piece{position:fixed;pointer-events:none;z-index:500;animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@media(max-width:600px){h1{font-size:1.8rem;}button{padding:12px 28px;font-size:0.95rem;}}
</style>
</head>
<body>
<div class="container">
  <div class="screen" id="ask-screen">
    <h1 id="ask-title">will you go on a lil date with me?</h1>
    <span class="kaomoji-main" id="kaomoji">(вБД вБДвАҐвБДѕЙвБДвАҐвБД вБД)</span>
    <div class="button-group">
      <button id="yes-btn" type="button">YES вЬ®</button>
      <span id="no-btn-container"><button id="no-btn" type="button">no рЯ•Ї</button></span>
    </div>
    <div class="speech" id="speech"></div>
  </div>
  <div class="screen hidden" id="yes-screen">
    <h2 style="font-size:2.4rem;">YAAAAY!! рЯТЧ</h2>
    <div class="big-emoji">(гБ•пљ°вЧХвАњвАњвЧХпљ°)гБ•</div>
    <p>we're gonna have so much fun~</p>
    <button class="reset-btn" id="back-btn" type="button">вЖР back</button>
  </div>
</div>
<div class="nice-modal" id="nice-modal">
  <div class="nice-modal-inner">
    <h2>ok fine... but also...</h2>
    <div class="big-emoji">рЯШП</div>
    <p>nice.</p>
    <button class="reset-btn" id="nice-back-btn" type="button">вЖР back</button>
  </div>
</div>
<div class="footer">made with рЯМЄ and a little too much courage</div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };

  // optional personalization: ?to=Name
  try {
    var to = new URLSearchParams(location.search).get('to');
    if (to) { $('ask-title').textContent = to + ', will you go on a lil date with me?'; }
  } catch(e){}

  var kaomojis = ['(вБД вБДвАҐвБДѕЙвБДвАҐвБД вБД)','(пљ°вЩ•вАњвЩ•пљ°)','(вЧХвАњвЧХвЬњ)','(вЬњвЧ†вАњвЧ†)','(гБ£ЋШѕЙЋШѕВ )','(вАҐвАњвАҐ)'];
  var pleas = ['wait really? рЯ•Ї','are you sure...','the yes button is right there','pretty please?','i made this whole page tho','my heart can\'t take this','ok now you\'re just playing hard to get','...','the button is getting tired of running'];
  var noCount = 0;

  // floating hearts background
  var heartEmoji = ['рЯТЧ','рЯМЄ','рЯТХ','вЬ®'];
  setInterval(function(){
    var h = document.createElement('div');
    h.className = 'heart';
    h.textContent = heartEmoji[Math.floor(Math.random()*heartEmoji.length)];
    h.style.left = Math.random()*100 + 'vw';
    h.style.animationDuration = (6 + Math.random()*6) + 's';
    document.body.appendChild(h);
    setTimeout(function(){ h.remove(); }, 13000);
  }, 1200);

  function dodge(){
    var btn = $('no-btn');
    btn.classList.add('dodge');
    var pad = 20, w = btn.offsetWidth, hgt = btn.offsetHeight;
    btn.style.left = pad + Math.random()*(window.innerWidth - w - pad*2) + 'px';
    btn.style.top  = pad + Math.random()*(window.innerHeight - hgt - pad*2) + 'px';
  }

  function onNo(){
    noCount++;
    if (noCount === 69) { $('nice-modal').classList.add('show'); return; }
    $('kaomoji').textContent = kaomojis[noCount % kaomojis.length];
    $('speech').textContent = pleas[Math.min(noCount-1, pleas.length-1)];
    // yes grows, no shrinks
    var yes = $('yes-btn'), no = $('no-btn');
    yes.style.transform = 'scale(' + Math.min(1 + noCount*0.08, 1.8) + ')';
    no.style.fontSize = Math.max(1.05 - noCount*0.06, 0.55) + 'rem';
    if (noCount >= 3) dodge();
    if (noCount >= 10) { no.textContent = 'fine... yes рЯ•Ї'; no.onclick = onYes; }
  }

  function confetti(){
    var colors = ['#ffb6c1','#e6d5f5','#b5ead7','#ffd9a0'];
    for (var i = 0; i < 60; i++){
      var c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = 'left:'+Math.random()*100+'vw;top:-10px;width:10px;height:10px;border-radius:'+(Math.random()>0.5?'50%':'2px')+';background:'+colors[i%4]+';animation-duration:'+(2+Math.random()*2)+'s;animation-delay:'+Math.random()*0.8+'s;';
      document.body.appendChild(c);
      setTimeout(function(el){ return function(){ el.remove(); }; }(c), 5000);
    }
  }

  function onYes(){
    $('ask-screen').classList.add('hidden');
    $('yes-screen').classList.remove('hidden');
    confetti();
  }

  function reset(){
    location.reload();
  }

  $('yes-btn').addEventListener('click', onYes);
  $('no-btn').addEventListener('click', onNo);
  // dodge before the tap lands once it's in runaway mode
  $('no-btn').addEventListener('touchstart', function(e){ if (noCount >= 3 && noCount < 10){ e.preventDefault(); onNo(); } }, {passive:false});
  $('no-btn').addEventListener('mouseenter', function(){ if (noCount >= 3 && noCount < 10) dodge(); });
  $('back-btn').addEventListener('click', reset);
  $('nice-back-btn').addEventListener('click', function(){ $('nice-modal').classList.remove('show'); });
})();
</script>
</body>
</html>
