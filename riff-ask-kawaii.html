<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>will you go on a lil date with me?</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pink:#ffb6c1;--lavender:#e6d5f5;--mint:#b5ead7;--cream:#fdf6f0;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:#5a4a6f;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}

/* floating hearts */
@keyframes floatHeart{0%{opacity:0;transform:translateY(100vh);}10%{opacity:1;}90%{opacity:1;}100%{opacity:0;transform:translateY(-100vh) translateX(80px);}}
.heart{position:fixed;font-size:2rem;pointer-events:none;z-index:0;}

.container{text-align:center;position:relative;z-index:2;max-width:500px;width:100%;}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.ask-screen{animation:fadeIn 0.6s ease-out;}
h1{font-size:2.2rem;font-weight:800;margin-bottom:10px;color:#5a4a6f;line-height:1.2;}
.kaomoji-main{font-size:1.5rem;display:block;margin-top:8px;margin-bottom:30px;}
.button-group{display:flex;gap:15px;justify-content:center;margin-bottom:50px;flex-wrap:wrap;}
button{font-family:'Nunito',inherit;font-size:1rem;padding:14px 35px;border:none;border-radius:50px;cursor:pointer;font-weight:700;transition:all 0.3s ease;text-transform:uppercase;letter-spacing:0.5px;box-shadow:0 4px 15px rgba(0,0,0,0.1);}
#yes-btn{background:linear-gradient(135deg,var(--pink),var(--lavender));color:#5a4a6f;}
#yes-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(255,182,193,0.4);}

/* no button container */
#no-btn-container{position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:6px;}
#no-btn{background:var(--mint);color:#5a4a6f;border:none;transition:transform 0.3s ease, background 0.3s ease;}
#no-btn:hover{transform:translateY(-2px);}
.crying-kaomoji{color:var(--pink);font-size:1.4rem;animation:popIn 0.3s ease-out;}
@keyframes popIn{from{opacity:0;transform:scale(1.5);}to{opacity:1;transform:scale(1);}}
@keyframes shake{0%,100%{transform:translateX(0) scaleX(var(--sx)) scaleY(var(--sy));}25%{transform:translateX(-5px) scaleX(var(--sx)) scaleY(var(--sy));}75%{transform:translateX(5px) scaleX(var(--sx)) scaleY(var(--sy));}}
.begging-text{color:#d4738f;font-size:0.9rem;font-style:italic;font-weight:600;animation:popIn 0.3s ease-out;}
.footer{font-size:0.95rem;color:#b5a1d0;margin-top:40px;}

/* confirmation screen */
.confirmation-screen{display:none;animation:fadeIn 0.5s ease-out;}
.confirmation-screen.show{display:block;}
.sparkles{font-size:3rem;margin-bottom:20px;animation:bounce 1s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
.confirmation-screen h2{font-size:2.5rem;margin-bottom:20px;color:#5a4a6f;}
.confirmation-screen p{font-size:1.1rem;color:#8b7b9f;margin-bottom:30px;}
.reset-btn{background:var(--mint);color:#5a4a6f;padding:12px 30px;font-size:0.9rem;}

/* nice modal */
.nice-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;}
.nice-modal.show{display:flex;}
.nice-modal-inner{background:white;border-radius:20px;padding:40px;text-align:center;color:#5a4a6f;animation:popIn 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);}
.nice-modal-inner h2{font-size:2rem;margin-bottom:10px;}
.nice-modal-inner .big-emoji{font-size:5rem;margin:16px 0;}

/* confetti */
.confetti-piece{position:fixed;pointer-events:none;z-index:500;}
@keyframes confettiFall{to{opacity:0;}}

@media(max-width:600px){h1{font-size:1.8rem;}button{padding:12px 28px;font-size:0.95rem;}}
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="pw-gate" style="position:fixed;inset:0;background:#0a0a0f;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;">
  <div style="text-align:center;padding:32px;border:1px solid #1e1e30;border-radius:12px;background:#0f0f18;min-width:280px;">
    <div style="font-size:22px;font-weight:900;background:linear-gradient(135deg,#ff5c5c,#ff8c42);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:18px;">riff</div>
    <input id="pw-input" type="password" placeholder="password" autofocus
      style="width:100%;background:#14141f;border:1px solid #1e1e30;border-radius:6px;padding:12px;color:#fff;font-family:'Nunito',sans-serif;font-size:14px;text-align:center;outline:none;-webkit-appearance:none;"
      onkeydown="if(event.key==='Enter')checkPw()" />
    <div id="pw-err" style="margin-top:8px;font-size:11px;color:#ff4f6e;min-height:14px;"></div>
  </div>
</div>

<div class="container">
  <!-- ASK SCREEN -->
  <div class="ask-screen" id="ask-screen">
    <h1>will you go on a lil date with me?</h1>
    <span class="kaomoji-main">(вҒ„ вҒ„вҖўвҒ„ПүвҒ„вҖўвҒ„ вҒ„)</span>
    <div class="button-group">
      <button id="yes-btn" onclick="handleYes(event)" ontouchend="handleYes(event)" style="-webkit-appearance:none;touch-action:manipulation;">YES вңЁ</button>
      <div id="no-btn-container">
        <button id="no-btn" onclick="handleNo(event)" ontouchend="handleNo(event)" style="-webkit-appearance:none;touch-action:manipulation;">no рҹҘә</button>
      </div>
    </div>
    <div class="footer">made with рҹҢё and a little too much courage</div>
  </div>

  <!-- YES SCREEN -->
  <div class="confirmation-screen" id="yes-screen">
    <div class="sparkles">вңЁрҹҢёвңЁ</div>
    <h2>YAAAAY!! рҹ’—</h2>
    <p>we're gonna have so much fun~</p>
    <button class="reset-btn" onclick="location.reload()" ontouchend="location.reload()">вҶҗ back</button>
  </div>
</div>

<!-- NICE MODAL (click 69) -->
<div class="nice-modal" id="nice-modal">
  <div class="nice-modal-inner">
    <h2>ok fine... but also...</h2>
    <div class="big-emoji">рҹҳҸ</div>
    <p style="font-size:1.1rem;color:#8b7b9f;margin-bottom:20px;">nice.</p>
    <button onclick="location.reload()" ontouchend="location.reload()" style="background:linear-gradient(135deg,#ffb6c1,#e6d5f5);color:#5a4a6f;border:none;border-radius:50px;padding:12px 30px;font-size:1rem;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;">вҶҗ back</button>
  </div>
</div>

<script>
// Password gate
(function(){if(sessionStorage.getItem('riffauth')==='spencerwire')document.getElementById('pw-gate').style.display='none';})();
function checkPw(){
  var v=document.getElementById('pw-input').value;
  if(v==='spencerwire'){sessionStorage.setItem('riffauth','spencerwire');document.getElementById('pw-gate').style.display='none';}
  else{document.getElementById('pw-err').textContent='wrong password';document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();}
}

// Floating hearts
function createFloatingHeart(){
  var h=document.createElement('div');
  h.className='heart';h.textContent='рҹ’•';
  h.style.left=Math.random()*window.innerWidth+'px';
  h.style.animation='floatHeart '+(5+Math.random()*3)+'s linear forwards';
  document.body.appendChild(h);
  setTimeout(function(){h.remove();},8000);
}
setInterval(createFloatingHeart,2000);

var clickCount=0;
var MAX=69;
var scaleX=1, scaleY=1;
var shakeInterval=null;

var kaomojis=[
  // 1-15 sad
  ['(в•Ҙп№Ҹв•Ҙ)','(пҪЎвҖўМҒпёҝвҖўМҖпҪЎ)','(>_<)','(TwT)','(пјӣПүпјӣ)','(в•Ҝпёөв•°,)','(гҒЈЛҳМ©в•ӯв•®ЛҳМ©)гҒЈ','(аІҘп№ҸаІҘ)','(пјӣпјӣ)','( ЛғМЈМЈМҘПүЛӮМЈМЈМҘ )','(в•Ҙ_в•Ҙ)','(Гіп№ҸГІпҪЎ)','пҪЎпҫҹ(пҫҹВҙПү`пҫҹ)пҫҹпҪЎ','(аёё к’Ұ аәҙк’Ұ аёё)','(г„’oг„’)'],
  // 16-30 distressed
  ['(гғҺР”`)В·','(в•ҜВ°в–ЎВ°пјүв•Ҝ','(в”ів—Үв”і)','Сү(пҫҹР”пҫҹСү)','(пҫү`в–ЎВҙ)пҫү','(пҫ’` пҫӣ Вҙ)','гғҪ(пҪҸ`зҡҝвҖІпҪҸ)пҫү','(в•¬ Г’ вҖё Г“)','(еҮёаІ зӣҠаІ )еҮё','(гғЎ` гғӯ Вҙ)','(пҫүВ°зӣҠВ°)пҫү','в”»в”Ғв”» пёөгғҪ(`Р”Вҙ)пҫүпёө в”»в”Ғв”»','(гғҺаІ зӣҠаІ )гғҺеҪЎ','Сү(аІ зӣҠаІ Сү)','(в•ҜвҖөв–ЎвҖІ)в•Ҝ'],
  // 31-50 desperate
  ['(;ВҙајҺаә¶Р”ајҺаә¶`)','гғҪ(пјӣв–Ҫпјӣ)гғҺ','(гҖҚгӮңгғӯгӮң)гҖҚ','(гғҺпјӣР”пјӣ)гғҺ','пҪЎпҫҹгғҪ(пҫҹВҙР”`)пҫүпҫҹпҪЎ','(пҫүР”`)пҪҘпҫҹпҪҘ','(гҖ’п№ҸгҖ’)','(в•ҜаІ _аІ пјүв•Ҝ','(пјӣРҙпјӣ)','(гҒЈ- вҖё вҖ“ ПӮ)','пҪЎпҫҹ(Tгғ®T)пҫҹпҪЎ','(пҪҳ_пҪҳ)','(к’Ұ к’і к’Ұ)','(гҒЈ В°Р” В°;)гҒЈ','(гғҺ_<гҖӮ)','(вҳҚп№ҸвҒ°)','(в—һвҖёв—ҹпјӣ)','(Гі_ГІ)','пҪЎпҫҹ(гӮҡВҙПү`гӮҡ)пҫҹпҪЎ','( пҫҹ,_гӮқпҫҹ)'],
  // 51-68 begging
  ['гҒҠйЎҳгҒ„пјҒ(>дәә<)','й ‘ејөгҒЈгҒҰпјҒ(аёҮ вҖўМҖ_вҖўМҒ)аёҮ','please... (Вҙ;Пү;`)','(жӢқ)please(жӢқ)','(бө’МҙМ¶М·МҘМҒ _бө’МҙМ¶М·МЈМҘМҖ)','(гғҺ_<гҖҒ)пҫӢпҪёпҫӢпҪё','(TвҢ“T)','(Вҙ;Рҙ;`)','(б—’б—©б—•)','(Кҳб—©Кҳ\')','к’°вңҰбҙ—вңҰк’ұ please','(в—Ўп№Ҹв—Ўвңҝ) pls','(*ВҙвҖўМҘМҘМҘ Пү вҖўМҘМҘМҘ`*)','(гҒЈпјһПүпјңc)','( ГігүЁГІ)пҫүвҷЎ','пҪЎпҫҹ(пҪЎпҫүПүгғҪпҪЎ)пҫҹпҪЎ','(ВҙпјӣПүпјӣпҪҖ)гӮҰпҪ©пҪ©','( Лҳ ВіЛҳ)вҷҘ']
];

function getKaomoji(n){
  if(n<=15) return kaomojis[0][(n-1)%15];
  if(n<=30) return kaomojis[1][(n-16)%15];
  if(n<=50) return kaomojis[2][(n-31)%20];
  if(n<69)  return kaomojis[3][(n-51)%18];
  return 'nice рҹҳҸ';
}

var beggingLines=['please...','i\'m sorry...','please reconsider...','don\'t you like me? рҹҳў','give me a chance...','i\'m begging you...','pretty please...','with sugar on top...','i\'ll do anything...','just give it a try...','come on...','please be kind...','i need this...','please... рҹ’”','you\'re breaking my heart...','one more chance...','i believe in us...','please рҹҳӯ'];

var lastTouchTime=0;

function handleNo(e){\n  if(e){e.preventDefault();e.stopPropagation();}\n  var now=Date.now();\n  if(now-lastTouchTime<300) return; // debounce double-fire\n  lastTouchTime=now;

  if(clickCount>=MAX) return;
  clickCount++;

  var btn=document.getElementById('no-btn');
  var container=document.getElementById('no-btn-container');

  // Add kaomoji above
  var k=document.createElement('div');
  k.className='crying-kaomoji';
  k.textContent=getKaomoji(clickCount);
  container.insertBefore(k,btn);

  // Scale
  if(clickCount<=15){ scaleX*=0.92; scaleY*=0.92; }
  else if(clickCount<69){ scaleX*=0.97; scaleY*=0.97; }
  scaleX=Math.max(0.08,scaleX);
  scaleY=Math.max(0.08,scaleY);

  // Color shift 31+
  if(clickCount>30){
    var p=(clickCount-30)/38;
    var r=Math.round(181+(255-181)*p);
    var g=Math.round(234+(107-234)*p);
    var b=Math.round(215+(157-215)*p);
    btn.style.background='rgb('+r+','+g+','+b+')';
  }

  // Shake 16-30
  if(clickCount>=16&&clickCount<=30){
    if(!shakeInterval){
      btn.style.setProperty('--sx',scaleX);
      btn.style.setProperty('--sy',scaleY);
      btn.style.animation='shake 0.3s ease-in-out infinite';
    }
  } else {
    btn.style.animation='none';
  }

  btn.style.transform='scale('+scaleX+','+scaleY+')';

  // Begging text 51-68
  if(clickCount>=51&&clickCount<69){
    var bt=document.createElement('div');
    bt.className='begging-text';
    bt.textContent=beggingLines[(clickCount-51)%beggingLines.length];
    container.insertBefore(bt,btn);
  }

  // Click 69 вҖ” NICE
  if(clickCount>=MAX){
    btn.style.animation='none';
    setTimeout(function(){
      fireConfetti(100);
      setTimeout(function(){
        document.getElementById('nice-modal').classList.add('show');
      },400);
    },200);
  }
}

function handleYes(e){\n  if(e){e.preventDefault();e.stopPropagation();}\n  var now=Date.now();\n  if(now-lastTouchTime<300) return;\n  lastTouchTime=now;
  fireConfetti(40);
  document.getElementById('ask-screen').style.display='none';
  document.getElementById('yes-screen').classList.add('show');
}

function fireConfetti(n){
  var emojis=['рҹҢё','вңЁ','рҹ’—','рҹҺү','рҹ’•','рҹ’–','рҹҢә','вӯҗ','рҹ©·','рҹ«§'];
  for(var i=0;i<n;i++){
    (function(){
      var c=document.createElement('div');
      c.className='confetti-piece';
      c.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      c.style.left=Math.random()*window.innerWidth+'px';
      c.style.top='-30px';
      c.style.fontSize=(1+Math.random()*1.5)+'rem';
      var dur=(2+Math.random()*1.5);
      var dx=(Math.random()-0.5)*300;
      c.style.transition='transform '+dur+'s ease-in, opacity '+dur+'s ease-in';
      document.body.appendChild(c);
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          c.style.transform='translateY('+(window.innerHeight+100)+'px) translateX('+dx+'px) rotate('+(Math.random()*720)+'deg)';
          c.style.opacity='0';
        });
      });
      setTimeout(function(){c.remove();},dur*1000+100);
    })();
  }
}
</script>
</body>
</html>
