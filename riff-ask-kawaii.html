<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>will you go on a lil date with me?</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --pink: #ffb6c1;
      --lavender: #e6d5f5;
      --mint: #b5ead7;
      --cream: #fdf6f0;
    }

    body {
      font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--cream);
      color: #5a4a6f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    @keyframes floatHeart {
      0% {
        opacity: 0;
        transform: translateY(100vh) translateX(0);
      }
      10% {
        opacity: 1;
      }
      90% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-100vh) translateX(100px);
      }
    }

    .heart {
      position: fixed;
      font-size: 2rem;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
      max-width: 500px;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: #5a4a6f;
      line-height: 1.2;
    }

    .kaomoji {
      font-size: 1.5rem;
      display: block;
      margin-top: 8px;
      margin-bottom: 30px;
    }

    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    button {
      font-family: 'Nunito', inherit;
      font-size: 1rem;
      padding: 14px 35px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    #yes-btn {
      background: linear-gradient(135deg, var(--pink) 0%, var(--lavender) 100%);
      color: #5a4a6f;
    }

    #yes-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 182, 193, 0.4);
    }

    #yes-btn:active {
      transform: translateY(-1px);
    }

    #no-btn-container {
      position: relative;
      min-height: 50px;
      display: inline-block;
    }

    .crying-kaomoji {
      color: var(--pink);
      font-size: 1.8rem;
      margin-bottom: 8px;
      animation: fadeInCry 0.4s ease-out;
    }

    @keyframes fadeInCry {
      from {
        opacity: 0;
        transform: scale(1.5);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    #no-btn {
      background: var(--mint);
      color: #5a4a6f;
      border: none;
      position: relative;
      transition: all 0.3s ease;
    }

    #no-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(181, 234, 215, 0.4);
    }

    #no-btn.shrinking {
      animation: shrinkBtn 0.4s ease-out;
    }

    @keyframes shrinkBtn {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(0.85);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    #no-btn.shaking {
      animation: shake 0.3s ease-in-out infinite;
    }

    #no-btn.vanished {
      display: none;
    }

    .vanish-message {
      color: var(--pink);
      font-size: 1.1rem;
      font-style: italic;
      margin-top: 30px;
      opacity: 0;
      animation: fadeInMessage 0.6s ease-out forwards;
    }

    @keyframes fadeInMessage {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .begging-text {
      color: #d4738f;
      font-size: 1rem;
      font-style: italic;
      margin-bottom: 12px;
      animation: fadeInMessage 0.4s ease-out;
      font-weight: 600;
    }

    .footer {
      font-size: 0.95rem;
      color: #b5a1d0;
      margin-top: 40px;
    }

    /* Confirmation screen */
    .confirmation-screen {
      display: none;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .confirmation-screen.show {
      display: block;
    }

    .confirmation-screen h2 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #5a4a6f;
    }

    .sparkles {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .confirmation-screen p {
      font-size: 1.1rem;
      color: #8b7b9f;
      margin-bottom: 30px;
    }

    .reset-btn {
      background: var(--mint);
      color: #5a4a6f;
      padding: 12px 30px;
      font-size: 0.9rem;
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(181, 234, 215, 0.4);
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 3;
    }

    .nice-joke-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .nice-joke-screen.show {
      display: flex;
      opacity: 1;
    }

    .nice-joke-content {
      background: white;
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      color: #5a4a6f;
      animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes popIn {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .nice-joke-content h2 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .nice-joke-content p {
      font-size: 1.3rem;
      margin-bottom: 30px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }

      .kaomoji {
        font-size: 1.2rem;
      }

      button {
        padding: 12px 28px;
        font-size: 0.95rem;
      }

      .button-group {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <!-- PASSWORD GATE -->
  <div id="pw-gate" style="position:fixed;inset:0;background:#0a0a0f;z-index:99999;display:flex;align-items:center;justify-content:center">
    <div style="text-align:center;padding:32px;border:1px solid #1e1e30;border-radius:12px;background:#0f0f18;min-width:280px">
      <input id="pw-input" type="password" placeholder="password" autofocus style="width:100%;background:#14141f;border:1px solid #1e1e30;border-radius:6px;padding:10px;color:#fff;font-size:14px;text-align:center;outline:none" onkeydown="if(event.key==='Enter')checkPw()" />
      <div id="pw-err" style="margin-top:8px;font-size:11px;color:#ff4f6e;min-height:14px"></div>
    </div>
  </div>

  <script>
    (function(){if(sessionStorage.getItem('riffauth')==='spencerwire')document.getElementById('pw-gate').style.display='none'})();
    function checkPw(){var v=document.getElementById('pw-input').value;if(v==='spencerwire'){sessionStorage.setItem('riffauth','spencerwire');document.getElementById('pw-gate').style.display='none';}else{document.getElementById('pw-err').textContent='wrong password';document.getElementById('pw-input').value='';document.getElementById('pw-input').focus();}}
  </script>

  <!-- FLOATING HEARTS BACKGROUND -->
  <script>
    function createFloatingHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.textContent = 'рЯТХ';
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.animation = `floatHeart ${5 + Math.random() * 3}s linear forwards`;
      document.body.appendChild(heart);
      
      setTimeout(() => heart.remove(), 8000);
    }

    setInterval(createFloatingHeart, 2000);
  </script>

  <div class="container">
    <div class="ask-screen">
      <h1>will you go on a lil date with me?</h1>
      <span class="kaomoji">(вБД вБДвАҐвБДѕЙвБДвАҐвБД вБД)</span>
      <div class="button-group">
        <button id="yes-btn">YES вЬ®</button>
        <div id="no-btn-container">
          <button id="no-btn" ontouchend="handleNoTouch(event)">no рЯ•Ї</button>
        </div>
      </div>
    </div>

    <div class="confirmation-screen">
      <div class="sparkles">вЬ®рЯМЄвЬ®</div>
      <h2>YAAAAY!!</h2>
      <p>we're gonna have so much fun рЯТЧ</p>
      <button class="reset-btn" onclick="location.reload()">вЖР back</button>
    </div>

    <div class="footer">made with рЯМЄ and a little too much courage</div>
  </div>

  <!-- NICE JOKE MODAL -->
  <div class="nice-joke-screen" id="niceJokeScreen">
    <div class="nice-joke-content">
      <h2>ok fine... but also...</h2>
      <p style="font-size: 5rem; margin: 20px 0;">рЯШП</p>
      <button class="reset-btn" onclick="location.reload()">вЖР back</button>
    </div>
  </div>

  <script>
    const isMobile = () => {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    };

    const noBtn = document.getElementById('no-btn');
    const noBtnContainer = document.getElementById('no-btn-container');
    const yesBtn = document.getElementById('yes-btn');
    const askScreen = document.querySelector('.ask-screen');
    const confirmationScreen = document.querySelector('.confirmation-screen');
    const niceJokeScreen = document.getElementById('niceJokeScreen');

    let clickCount = 0;
    const maxClicks = 69;
    let currentScale = 1;

    // Kaomoji progression arrays
    const kaomojis = [
      // Early (1-15): Sad
      ['(вХ•пєПвХ•)', '(пљ°вАҐћБпЄњвАҐћАпљ°)', '(>_<)', '(вХ•пєПвХ•)', '(пљ°вАҐћБпЄњвАҐћАпљ°)', '(>_<)', '(вХ•пєПвХ•)', '(пљ°вАҐћБпЄњвАҐћАпљ°)', '(>_<)', '(вХ•пєПвХ•)', '(пљ°вАҐћБпЄњвАҐћАпљ°)', '(>_<)', '(вХ•пєПвХ•)', '(пљ°вАҐћБпЄњвАҐћАпљ°)', '(>_<)'],
      // Mid (16-30): Distressed
      ['(гГО–Ф`)¬Ј', '(вХѓ¬∞вЦ°¬∞пЉЙвХѓ', '(вФ≥вЧЗвФ≥)', '(гГО–Ф`)¬Ј', '(вХѓ¬∞вЦ°¬∞пЉЙвХѓ', '(вФ≥вЧЗвФ≥)', '(гГО–Ф`)¬Ј', '(вХѓ¬∞вЦ°¬∞пЉЙвХѓ', '(вФ≥вЧЗвФ≥)', '(гГО–Ф`)¬Ј', '(вХѓ¬∞вЦ°¬∞пЉЙвХѓ', '(вФ≥вЧЗвФ≥)', '(гГО–Ф`)¬Ј', '(вХѓ¬∞вЦ°¬∞пЉЙвХѓ', '(вФ≥вЧЗвФ≥)'],
      // Late (31-50): Desperate
      ['(;¬іаЉОаЇґ–ФаЉОаЇґ`)', 'гГљ(пЉЫвЦљпЉЫ)гГО', '(гАНгВЬгГ≠гВЬ)гАН', '(;¬іаЉОаЇґ–ФаЉОаЇґ`)', 'гГљ(пЉЫвЦљпЉЫ)гГО', '(гАНгВЬгГ≠гВЬ)гАН', '(;¬іаЉОаЇґ–ФаЉОаЇґ`)', 'гГљ(пЉЫвЦљпЉЫ)гГО', '(гАНгВЬгГ≠гВЬ)гАН', '(;¬іаЉОаЇґ–ФаЉОаЇґ`)', 'гГљ(пЉЫвЦљпЉЫ)гГО', '(гАНгВЬгГ≠гВЬ)гАН', '(;¬іаЉОаЇґ–ФаЉОаЇґ`)', 'гГљ(пЉЫвЦљпЉЫ)гГО', '(гАНгВЬгГ≠гВЬ)гАН', '(;¬іаЉОаЇґ–ФаЉОаЇґ`)', 'гГљ(пЉЫвЦљпЉЫ)гГО', '(гАНгВЬгГ≠гВЬ)гАН', '(;¬іаЉОаЇґ–ФаЉОаЇґ`)', 'гГљ(пЉЫвЦљпЉЫ)гГО'],
      // Begging (51-68): Ultra desperate
      ['гБКй°ШгБДпЉБ(>дЇЇ<)', 'й†СеЉµгБ£гБ¶пЉБ(аЄЗ вАҐћА_вАҐћБ)аЄЗ', 'please... (¬і;ѕЙ;`)', 'гБКй°ШгБДпЉБ(>дЇЇ<)', 'й†СеЉµгБ£гБ¶пЉБ(аЄЗ вАҐћА_вАҐћБ)аЄЗ', 'please... (¬і;ѕЙ;`)', 'гБКй°ШгБДпЉБ(>дЇЇ<)', 'й†СеЉµгБ£гБ¶пЉБ(аЄЗ вАҐћА_вАҐћБ)аЄЗ', 'please... (¬і;ѕЙ;`)', 'гБКй°ШгБДпЉБ(>дЇЇ<)', 'й†СеЉµгБ£гБ¶пЉБ(аЄЗ вАҐћА_вАҐћБ)аЄЗ', 'please... (¬і;ѕЙ;`)', 'гБКй°ШгБДпЉБ(>дЇЇ<)', 'й†СеЉµгБ£гБ¶пЉБ(аЄЗ вАҐћА_вАҐћБ)аЄЗ', 'please... (¬і;ѕЙ;`)', 'гБКй°ШгБДпЉБ(>дЇЇ<)', 'й†СжЬЫгБ£гБ¶пЉБ(аЄЗ вАҐћА_вАҐћБ)аЄЗ', 'please... (¬і;ѕЙ;`)'],
    ];

    const beggingTexts = [
      'please...',
      'i\'m sorry...',
      'please reconsider...',
      'don\'t you like me? рЯШҐ',
      'give me a chance...',
      'i\'m begging you...',
      'please say yes...',
      'pretty please...',
      'with sugar on top...',
      'i\'ll do anything...',
      'just give it a try...',
      'come on...',
      'please be kind...',
      'i need this...',
      'please... рЯТФ',
      'you\'re breaking my heart...',
      'one more chance...',
      'i believe in us...',
    ];

    function getKaomoji(click) {
      if (click <= 15) {
        return kaomojis[0][(click - 1) % kaomojis[0].length];
      } else if (click <= 30) {
        return kaomojis[1][(click - 16) % kaomojis[1].length];
      } else if (click <= 50) {
        return kaomojis[2][(click - 31) % kaomojis[2].length];
      } else if (click < 69) {
        return kaomojis[3][(click - 51) % kaomojis[3].length];
      } else {
        return 'nice рЯШП';
      }
    }

    function getButtonColor(click) {
      if (click <= 30) {
        return 'var(--mint)';
      }
      // Progressive color shift from mint to pink/red (clicks 31-68)
      const colorProgress = (click - 30) / (68 - 30);
      // Interpolate between mint (#b5ead7) and red (#ff6b9d)
      const r = Math.round(181 + (255 - 181) * colorProgress);
      const g = Math.round(234 + (107 - 234) * colorProgress);
      const b = Math.round(215 + (157 - 215) * colorProgress);
      return `rgb(${r}, ${g}, ${b})`;
    }

    function shrinkNoButton() {
      if (clickCount >= maxClicks) return;

      clickCount++;

      // Clicks 1-15: Small scale steps (0.92 per click)
      // Clicks 16-68: Tiny scale steps (0.97 per click to make it last)
      if (clickCount <= 15) {
        currentScale *= 0.92;
      } else if (clickCount < 69) {
        currentScale *= 0.97;
      }

      currentScale = Math.max(0.05, currentScale);

      // Get appropriate kaomoji
      const emoji = getKaomoji(clickCount);
      
      // Add crying kaomoji above
      const crying = document.createElement('div');
      crying.className = 'crying-kaomoji';
      crying.textContent = emoji;
      noBtnContainer.insertBefore(crying, noBtn);

      // Update button color based on click count
      const newColor = getButtonColor(clickCount);
      noBtn.style.background = newColor;

      // Add shaking animation for clicks 16-30
      if (clickCount >= 16 && clickCount <= 30) {
        noBtn.classList.add('shaking');
      } else if (clickCount > 30) {
        noBtn.classList.remove('shaking');
      }

      // Shrink button
      noBtn.classList.add('shrinking');
      noBtn.style.transform = `scale(${currentScale})`;

      setTimeout(() => {
        noBtn.classList.remove('shrinking');
      }, 400);

      // Add begging text for clicks 51-68
      if (clickCount >= 51 && clickCount < 69) {
        const beggingText = document.createElement('div');
        beggingText.className = 'begging-text';
        beggingText.textContent = beggingTexts[(clickCount - 51) % beggingTexts.length];
        noBtnContainer.insertBefore(beggingText, noBtn);
      }

      // Special event on click 69
      if (clickCount >= maxClicks) {
        setTimeout(() => {
          // Create massive confetti
          for (let i = 0; i < 100; i++) {
            createConfetti();
          }
          
          // Hide the ask screen
          askScreen.style.display = 'none';
          
          // Show nice joke screen
          setTimeout(() => {
            niceJokeScreen.classList.add('show');
          }, 300);
        }, 300);
      }
    }

    // Attach directly вАФ no cloneNode (strips handlers)
    const finalNoBtn = document.getElementById('no-btn');

    finalNoBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      shrinkNoButton();
    });

    finalNoBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      e.stopPropagation();
      shrinkNoButton();
    });

    yesBtn.addEventListener('click', () => {
      // Create confetti
      for (let i = 0; i < 30; i++) {
        createConfetti();
      }
      askScreen.style.display = 'none';
      confirmationScreen.classList.add('show');
    });

    yesBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      // Create confetti
      for (let i = 0; i < 30; i++) {
        createConfetti();
      }
      askScreen.style.display = 'none';
      confirmationScreen.classList.add('show');
    });

    function createConfetti() {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.textContent = ['рЯМЄ', 'вЬ®', 'рЯТЧ', 'рЯОЙ', 'рЯТХ', 'рЯТЦ', 'рЯМЇ', 'в≠Р'][Math.floor(Math.random() * 8)];
      confetti.style.left = Math.random() * window.innerWidth + 'px';
      confetti.style.top = '-20px';
      confetti.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
      confetti.style.animation = `confettiFall ${2 + Math.random() * 1}s linear forwards`;
      document.body.appendChild(confetti);

      setTimeout(() => confetti.remove(), 3000);
    }

    const style = document.createElement('style');
    style.textContent = `
      @keyframes confettiFall {
        to {
          transform: translateY(${window.innerHeight + 100}px) translateX(${(Math.random() - 0.5) * 200}px) rotate(360deg);
          opacity: 0;
        }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
