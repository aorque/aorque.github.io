<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>be my riff partner?</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Space Grotesk',sans-serif;background:#0a0a0a;color:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;position:relative;}
.container{text-align:center;max-width:520px;width:100%;position:relative;z-index:2;}
h1{font-size:2.6rem;font-weight:700;margin-bottom:36px;line-height:1.1;}
.button-group{display:flex;gap:18px;justify-content:center;align-items:center;min-height:100px;flex-wrap:wrap;}
button{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;border:none;border-radius:12px;padding:18px 44px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:transform 0.1s ease;}
button:active{transform:scale(0.93);}
#yes-btn{background:linear-gradient(135deg,#ff3d00,#ff9100);color:#000;box-shadow:0 0 30px rgba(255,61,0,0.4);}
#no-btn{background:#1f1f1f;color:#888;border:1px solid #333;}
#no-btn.fleeing{position:fixed;z-index:60;transition:top 0.18s cubic-bezier(0.3,1.4,0.5,1),left 0.18s cubic-bezier(0.3,1.4,0.5,1);}
#escape-counter{margin-top:26px;font-size:0.85rem;color:#ff3d00;min-height:2.6em;opacity:0;transition:opacity 0.3s;}
#escape-counter.show{opacity:1;}
.taunt{display:block;color:#666;margin-top:4px;}
@keyframes shake{0%,100%{transform:translate(0);}20%{transform:translate(-8px,4px);}40%{transform:translate(8px,-4px);}60%{transform:translate(-6px,-3px);}80%{transform:translate(6px,3px);}}
body.shake{animation:shake 0.35s ease;}
.hidden{display:none !important;}
#win-screen h2{font-size:3rem;margin-bottom:14px;}
#win-screen .flames{font-size:4rem;margin:10px 0 18px;}
#win-screen p{color:#aaa;font-size:1.1rem;}
.reset-btn{background:none;color:#555;font-size:0.85rem;padding:10px;margin-top:30px;}
.footer{position:fixed;bottom:14px;left:0;right:0;text-align:center;font-size:0.72rem;color:#444;z-index:2;}
@keyframes flameRise{0%{opacity:0;transform:translateY(20px) scale(0.5);}30%{opacity:1;}100%{opacity:0;transform:translateY(-120px) scale(1.4);}}
.flame-bit{position:fixed;pointer-events:none;z-index:500;animation:flameRise 1.2s ease-out forwards;font-size:1.6rem;}
@media(max-width:600px){h1{font-size:2rem;}button{padding:14px 34px;font-size:1rem;}}
</style>
</head>
<body>
<div class="container">
  <div id="ask-screen">
    <h1>be my riff partner?</h1>
    <div class="button-group">
      <button id="yes-btn" type="button">YES</button>
      <button id="no-btn" type="button">no</button>
    </div>
    <div id="escape-counter"></div>
  </div>
  <div id="win-screen" class="hidden">
    <div class="flames">🔥</div>
    <h2>LET'S GO</h2>
    <p>screenshot this.</p>
    <button class="reset-btn" id="back-btn" type="button">← back</button>
  </div>
</div>
<div class="footer">built at midnight by someone who thought this was a good idea</div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var escapes = 0;
  var taunts = ['too slow.','you can\'t catch me.','seriously?','the other button doesn\'t run.','cardio time.','this is my whole personality now.','I can do this all night.','your finger must be tired.','just press YES, coward.','I\'m not even sorry.'];

  function flee(){
    var btn = $('no-btn');
    btn.classList.add('fleeing');
    var pad = 16, w = btn.offsetWidth || 120, h = btn.offsetHeight || 56;
    btn.style.left = pad + Math.random()*(window.innerWidth - w - pad*2) + 'px';
    btn.style.top  = pad + Math.random()*(window.innerHeight - h - pad*2) + 'px';
    escapes++;
    var c = $('escape-counter');
    c.classList.add('show');
    c.innerHTML = 'escape attempts: ' + escapes + '<span class="taunt">' + taunts[escapes % taunts.length] + '</span>';
    document.body.classList.remove('shake');
    void document.body.offsetWidth; // restart animation
    document.body.classList.add('shake');
  }

  function flames(){
    for (var i = 0; i < 24; i++){
      (function(i){
        setTimeout(function(){
          var f = document.createElement('div');
          f.className = 'flame-bit';
          f.textContent = '🔥';
          f.style.left = Math.random()*100 + 'vw';
          f.style.bottom = '0px';
          document.body.appendChild(f);
          setTimeout(function(){ f.remove(); }, 1300);
        }, i*90);
      })(i);
    }
  }

  function onYes(){
    $('ask-screen').classList.add('hidden');
    $('win-screen').classList.remove('hidden');
    flames();
  }

  $('yes-btn').addEventListener('click', onYes);
  // the NO button never lets itself be pressed — it flees on approach/touch
  $('no-btn').addEventListener('touchstart', function(e){ e.preventDefault(); flee(); }, {passive:false});
  $('no-btn').addEventListener('mouseenter', flee);
  $('no-btn').addEventListener('click', flee); // fallback if somehow caught
  $('back-btn').addEventListener('click', function(){ location.reload(); });
})();
</script>
</body>
</html>
