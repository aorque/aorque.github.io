<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>riff - be my riff partner?</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0e0e12;color:#eaeaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{max-width:500px;width:100%;text-align:center;}
.hidden{display:none !important;}
.logo{font-weight:800;font-size:1rem;color:#8b7cf8;margin-bottom:20px;letter-spacing:0.1em;text-transform:uppercase;}
h1{font-size:2.3rem;font-weight:800;line-height:1.25;margin-bottom:12px;}
.sub{color:#9a9aa8;margin-bottom:36px;}
.btn-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
button{font-family:'Inter',sans-serif;font-weight:600;font-size:1rem;border:none;border-radius:12px;padding:16px 40px;cursor:pointer;touch-action:manipulation;-webkit-appearance:none;-webkit-tap-highlight-color:transparent;user-select:none;transition:transform 0.12s;}
button:active{transform:scale(0.95);}
#yes-btn{background:linear-gradient(135deg,#8b7cf8,#d57cf8);color:#fff;box-shadow:0 8px 24px rgba(139,124,248,0.35);transition:transform 0.25s ease;}
#no-btn{background:#1b1b24;color:#777;border:1px solid #2c2a42;transition:all 0.25s ease;}
#no-messages{color:#8b7cf8;font-size:0.88rem;min-height:1.7em;margin-top:20px;line-height:1.6;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.screen{animation:fadeIn 0.5s ease;}
#confirmation .big{font-size:3.4rem;margin-bottom:14px;}
#confirmation h2{font-size:1.8rem;margin-bottom:18px;}
.rsvp{background:#15151d;border:1px solid #232336;border-radius:14px;padding:20px;text-align:left;font-size:0.9rem;line-height:2;margin-bottom:18px;}
.rsvp .k{color:#9a9aa8;}
.rsvp .ok{color:#7cd9a8;font-weight:600;}
.foot-line{color:#555;font-size:0.78rem;margin-top:24px;line-height:1.8;}
.confetti-piece{position:fixed;pointer-events:none;z-index:500;animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
@media(max-width:600px){h1{font-size:1.8rem;}}
</style>
</head>
<body>
<div class="container">
  <div class="screen" id="main-content">
    <div class="logo">riff</div>
    <h1 id="headline">be my riff partner?</h1>
    <div class="sub">I built this app for moments like this. humor me.</div>
    <div class="btn-row">
      <button id="yes-btn" type="button">Yes</button>
      <button id="no-btn" type="button">No</button>
    </div>
    <div id="no-messages"></div>
  </div>

  <div class="screen hidden" id="confirmation">
    <div class="big">🔥</div>
    <h2>let's go.</h2>
    <div class="rsvp">
      <div><span class="k">RSVP Status</span> — <span class="ok">Confirmed</span></div>
      <div><span class="k">Founded</span> — June 6, 2026 · 11:59 PM</div>
      <div><span class="k">Status</span> — A fleeting moment in the making</div>
    </div>
    <div class="foot-line">screenshot this. that's the contract.</div>
  </div>
</div>
<div class="foot-line" style="position:fixed;bottom:12px;left:0;right:0;text-align:center;">built at midnight · riff.date · a fleeting moments product</div>

<script>
(function(){
  "use strict";
  var $ = function(id){ return document.getElementById(id); };
  var noCount = 0;
  var msgs = ['hm. let me rephrase the question.','the no button is getting smaller. coincidence?','I respect the hustle but no.','physics is on my side here.','one option remains. choose freely.'];

  try {
    var to = new URLSearchParams(location.search).get('to');
    if (to) { $('headline').textContent = to + ', be my riff partner?'; }
  } catch(e){}

  function confetti(){
    var colors = ['#8b7cf8','#d57cf8','#7cd9a8','#f8a87c'];
    for (var i = 0; i < 50; i++){
      var c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = 'left:'+Math.random()*100+'vw;top:-10px;width:9px;height:9px;border-radius:'+(Math.random()>0.5?'50%':'2px')+';background:'+colors[i%4]+';animation-duration:'+(2+Math.random()*2)+'s;animation-delay:'+Math.random()*0.7+'s;';
      document.body.appendChild(c);
      setTimeout(function(el){ return function(){ el.remove(); }; }(c), 4500);
    }
  }

  function yes(){
    $('main-content').classList.add('hidden');
    $('confirmation').classList.remove('hidden');
    confetti();
  }

  $('yes-btn').addEventListener('click', yes);
  $('no-btn').addEventListener('click', function(){
    noCount++;
    $('no-messages').textContent = msgs[Math.min(noCount-1, msgs.length-1)];
    // no shrinks, yes grows
    var no = $('no-btn'), ys = $('yes-btn');
    no.style.transform = 'scale(' + Math.max(1 - noCount*0.16, 0.25) + ')';
    no.style.opacity = Math.max(1 - noCount*0.16, 0.25);
    ys.style.transform = 'scale(' + Math.min(1 + noCount*0.12, 1.7) + ')';
    if (noCount >= 5){ no.style.display = 'none'; }
  });
})();
</script>
</body>
</html>
